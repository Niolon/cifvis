<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>CIF Viewer</title>
      <script type="module" crossorigin src="/cifvis/assets/main.B3SvjHqp.js"></script>
      <link rel="stylesheet" crossorigin href="/cifvis/assets/main.DcJVDRvg.css">
    </head>
    <body>
        <input type="file" 
               id="cif-upload" 
               accept=".cif,.fcf,.cube,.cub"
               style="display: none;">
        <div class="button-container">
            <button class="control-button upload-button" id="upload-button"></button>
            <button class="control-button settings-button" id="settings-button" type="button"
                    aria-label="Viewer settings" title="Viewer settings"></button>
            <button class="control-button hydrogen-button" id="hydrogen-button"></button>
            <button class="control-button disorder-button" id="disorder-button" style="display: none;"></button>
            <button class="control-button symmetry-button" id="symmetry-button"></button>
            <button class="control-button density-button" id="density-level" type="button" hidden></button>
            <select id="cif-block-select" aria-label="CIF data block" hidden></select>
        </div>
        <div id="status-message"></div>
        <div id="selection-container" class="selection-container"></div>    </body>
</html>
